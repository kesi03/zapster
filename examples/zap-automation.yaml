name: "OWASP ZAP Scan Plan"

env:
  target: "http://localhost:3000"
  contexts:
    - name: "mainContext"
      urls:
        - "http://localhost:3000"
      includePaths:
        - "http://localhost:3000.*"
      excludePaths: []

jobs:
  - type: "passiveScan-config"
    parameters:
      maxAlertsPerRule: 0

  - type: "spider"
    parameters:
      context: "mainContext"
      url: "http://localhost:3000"

  - type: "spiderAjax"
    parameters:
      context: "mainContext"
      url: "http://localhost:3000"
      maxDuration: 5

  - type: "activeScan"
    parameters:
      context: "mainContext"
