name: "OWASP ZAP Scan Plan"

env:
  target: "http://juice-shop:3000"
  contexts:
    - name: "mainContext"
      urls:
        - "http://juice-shop:3000"
      includePaths:
        - "http://juice-shop:3000.*"
      excludePaths: []

jobs:
  - type: "passiveScan-config"
    parameters:
      maxAlertsPerRule: 0

  - type: "spider"
    parameters:
      context: "mainContext"
      url: "http://juice-shop:3000"

  - type: "spiderAjax"
    parameters:
      context: "mainContext"
      url: "http://juice-shop:3000"
      maxDuration: 5

  - type: "activeScan"
    parameters:
      context: "mainContext"

  - type: "report"
    parameters:
      title: "ZAP Security Scan Report"
      formats:
        - "json"
        - "html"
        - "xml"
        - "md"
      outputDir: "zap-results"