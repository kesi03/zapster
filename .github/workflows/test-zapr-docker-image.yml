    steps:

    - name: 📜 Fetch logs from ZAP container (dynamic discovery)
      run: |
        CONTAINER_ID=$(docker ps --filter ancestor=mockholm/zap-daemon --format "{{.ID}}" | head -n 1)
        echo "Found ZAP container: $CONTAINER_ID"

        if [ -n "$CONTAINER_ID" ]; then
          docker logs "$CONTAINER_ID"
