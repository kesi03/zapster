name: Test ZAP Downloader (pip)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  test-zap-downloader:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install zap-downloader
        run: pip install zap-downloader==1.0.0

      - name: Run offline pack
        run: python -m zap_downloader offline pack -o zap-offline.tar

      - name: Run offline unpack
        run: python -m zap_downloader offline unpack -i zap-offline.tar -o zap-workspace

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack + pin pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run build

      - name: Start ZAP Daemon
        run: pnpm daemon:start -t zap-workspace/workspace/default.toml
