name: ZAP Full Scan

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to scan'
        required: true
        default: 'http://juice-shop:3000'
      config_url:
        description: 'URL of config file'
        required: false
      include_alpha:
        description: 'Include alpha rules'
        required: false
        default: 'false'
      ajax_spider:
        description: 'Use AJAX spider'
        required: false
        default: 'false'
      spider_mins:
        description: 'Spider minutes (0 = unlimited)'
        required: false
        default: '0'
      debug:
        description: 'Enable debug'
        required: false
        default: 'false'

jobs:
  zap-full-scan:
    name: OWASP ZAP Full Scan
    runs-on: ubuntu-latest
    env:
      TARGET_URL: ${{ inputs.target_url }}
      CONFIG_URL: ${{ inputs.config_url }}
      DEBUG: ${{ inputs.debug }}
      ZAPSTER_WORKSPACE: zap-full-scan-results
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack + pin pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run build

      - name: Create workspace directory
        run: mkdir -p $ZAPSTER_WORKSPACE

      - name: Run ZAP Full Scan
        run: |
          DEBUG_FLAG=""
          CONFIG_FLAG=""
          ALPHA_FLAG=""
          AJAX_FLAG=""
          SPIDER_ARG=""
          if [ "${{ inputs.debug }}" == "true" ]; then
            DEBUG_FLAG="--debug"
          fi
          if [ -n "${{ inputs.config_url }}" ]; then
            CONFIG_FLAG="--config-url ${{ inputs.config_url }}"
          fi
          if [ "${{ inputs.include_alpha }}" == "true" ]; then
            ALPHA_FLAG="--include-alpha"
          fi
          if [ "${{ inputs.ajax_spider }}" == "true" ]; then
            AJAX_FLAG="--ajax-spider"
          fi
          SPIDER_MINS="${{ inputs.spider_mins }}"
          if [ "$SPIDER_MINS" != "0" ]; then
            SPIDER_ARG="--spider-mins $SPIDER_MINS"
          fi
          
          pnpm run docker-full-scan --target $TARGET_URL \
            --report-html report.html \
            --report-json report.json \
            --workspace $ZAPSTER_WORKSPACE \
            $CONFIG_FLAG \
            $ALPHA_FLAG \
            $AJAX_FLAG \
            $DEBUG_FLAG \
            $SPIDER_ARG

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: zap-full-scan-reports-${{ github.run_number }}
          path: ${{ env.ZAPSTER_WORKSPACE }}/
          retention-days: 30

      - name: Display Results
        run: |
          echo "## ZAP Full Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** $TARGET_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f $ZAPSTER_WORKSPACE/report.json ]; then
            HIGH=$(grep -o '"risk":"HIGH"' $ZAPSTER_WORKSPACE/report.json | wc -l)
            MEDIUM=$(grep -o '"risk":"MEDIUM"' $ZAPSTER_WORKSPACE/report.json | wc -l)
            LOW=$(grep -o '"risk":"LOW"' $ZAPSTER_WORKSPACE/report.json | wc -l)
            INFO=$(grep -o '"risk":"INFORMATIONAL"' $ZAPSTER_WORKSPACE/report.json | wc -l)
            
            echo "### Alert Summary" >> $GITHUB_STEP_SUMMARY
            echo "| Risk Level | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|------------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| High | $HIGH |" >> $GITHUB_STEP_SUMMARY
            echo "| Medium | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
            echo "| Low | $LOW |" >> $GITHUB_STEP_SUMMARY
            echo "| Informational | $INFO |" >> $GITHUB_STEP_SUMMARY
          fi