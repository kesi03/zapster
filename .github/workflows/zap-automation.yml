name: ZAP Automation Scan

on:
  # push:
  #   branches: [main, master]
  # pull_request:
  #   branches: [main, master]
  workflow_dispatch:
    inputs:
      plan_file:
        description: 'Path to ZAP automation plan file'
        required: true
        default: 'examples/zap-automation.yaml'
      debug:
        description: 'Enable debug logging'
        required: false
        default: 'false'

jobs:
  zap-automation:
    name: ZAP Automation Scan
    runs-on: ubuntu-latest
    env:
      ZAP_HOST: localhost
      ZAP_PORT: 8080
      ZAP_API_KEY: zapster-api-key
      PLAN_FILE: ${{ inputs.plan_file || 'examples/zap-automation.yaml' }}
      DEBUG: ${{ inputs.debug || 'false' }}
      ZAPSTER_WORKSPACE: zap-results
    services:
      zap:
        image: mockholm/zap-daemon
        ports:
          - 8080:8080
          - 8090:8090
        env:
          ZAP_API_KEY: zapster-api-key

      juice-shop:
        image: bkimminich/juice-shop:latest
        ports:
          - 3000:3000
        options: --shm-size=512m

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack + pin pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run build

      - name: Create workspace directory
        run: |
          mkdir -p $ZAPSTER_WORKSPACE
          mkdir -p $ZAPSTER_WORKSPACE/reports
          mkdir -p $ZAPSTER_WORKSPACE/logs

      - name: Wait for Juice Shop to be ready
        run: |
          echo "Waiting for Juice Shop to be ready..."
          timeout=120
          counter=0
          while [ $counter -lt $timeout ]; do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Juice Shop is ready!"
              exit 0
            fi
            counter=$((counter + 5))
            sleep 5
          done
          echo "Juice Shop failed to start within $timeout seconds"
          exit 1

      - name: Wait for ZAP to be ready
        run: |
          echo "Waiting for ZAP to be ready..."
          timeout=120
          counter=0
          while [ $counter -lt $timeout ]; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080 | grep -qE "200|302|401"; then
              echo "ZAP is ready!"
              exit 0
            fi
            counter=$((counter + 5))
            sleep 5
          done
          echo "ZAP failed to start within $timeout seconds"
          exit 1

      - name: Verify ZAP Connection
        run: pnpm run zap:version

      - name: Run ZAP Automation
        run: |
          DEBUG_FLAG=""
          if [ "${{ inputs.debug }}" = "true" ]; then
            DEBUG_FLAG="--debug"
          fi
          pnpm automate --file ${{ env.PLAN_FILE }} --image mockholm/zap-daemon --workspace $ZAPSTER_WORKSPACE $DEBUG_FLAG

      - name: Generate JUnit Results
        run: pnpm run createJUnitResults --workspace zap-results --name junit-results.xml --title "ZAP Security Scan"

      - name: Generate Alert JSON
        run: pnpm run getAlerts --workspace zap-results --name alerts.json

      - name: Generate Excel Report
        run: pnpm run createExcelReport --workspace zap-results --name zap-report.xlsx
      
      - name: Get Docker Logs
        run: pnpm run getDockerLog --image mockholm/zap-daemon --workspace $ZAPSTER_WORKSPACE --name agent.log

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: zap-automation-reports-${{ github.run_number }}-${{ github.sha }}
          path: |
            zap-results/reports/
            zap-results/logs/
            zap-results/*.html
            zap-results/*.json
            zap-results/*.xml
            zap-results/*.md
          retention-days: 30

      - name: Display Results Summary
        run: |
          echo "## ZAP Automation Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Plan File:** ${{ env.PLAN_FILE }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          JSON_REPORT=$(find zap-results -name "*report-json*.json" -type f 2>/dev/null | head -1)
          if [ -n "$JSON_REPORT" ] && [ -f "$JSON_REPORT" ]; then
            HIGH=$(grep -o '"risk":"HIGH"' "$JSON_REPORT" | wc -l)
            MEDIUM=$(grep -o '"risk":"MEDIUM"' "$JSON_REPORT" | wc -l)
            LOW=$(grep -o '"risk":"LOW"' "$JSON_REPORT" | wc -l)
            INFO=$(grep -o '"risk":"INFORMATIONAL"' "$JSON_REPORT" | wc -l)
            
            echo "### Alert Summary" >> $GITHUB_STEP_SUMMARY
            echo "| Risk Level | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|------------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| High | $HIGH |" >> $GITHUB_STEP_SUMMARY
            echo "| Medium | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
            echo "| Low | $LOW |" >> $GITHUB_STEP_SUMMARY
            echo "| Informational | $INFO |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "### Reports Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for report in zap-results/reports/*; do
            if [ -f "$report" ]; then
              echo "- \`$report\`" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "All reports and logs have been uploaded as build artifacts." >> $GITHUB_STEP_SUMMARY
