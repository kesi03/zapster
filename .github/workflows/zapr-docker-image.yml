name: Create Zapr Daemon Image and Trigger Tests
# This workflow builds a ZAP daemon Docker image with an auto-generated API key, pushes it to GHCR and Dockerhub, and triggers a test workflow to verify the image.

on:
  workflow_dispatch:

jobs:
  generate-build-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      actions: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract version from tag
      id: vars
      run: |
            if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
            else
            echo "VERSION=latest" >> $GITHUB_ENV
            fi

    - name: Generate ZAP API Key
      run: |
        ZAP_API_KEY=$(openssl rand -hex 16)
        echo "ZAP_API_KEY=$ZAP_API_KEY" >> $GITHUB_ENV
        echo "🔑 ZAP API Key (for container use): $ZAP_API_KEY"

    - name: Generate Dockerfile inline
      run: |
        VERSION=${VERSION:-stable}
        MODE="daemon"
        PORT=8080

        echo "FROM ghcr.io/zaproxy/zaproxy:$VERSION" > Dockerfile
        echo "" >> Dockerfile
        echo "ARG ZAP_API_KEY" >> Dockerfile
        echo "LABEL description=\"ZAP daemon with auto-generated API key\"" >> Dockerfile
        echo "LABEL zap.api.key=\"Auto-generated at build time. Displayed on container startup and accessible via \$ZAP_API_KEY\"" >> Dockerfile
        echo "ENV ZAP_API_KEY=\$ZAP_API_KEY" >> Dockerfile
        echo "ENTRYPOINT [\"sh\", \"-c\", \"echo 🔑 ZAP API Key: \$ZAP_API_KEY && \\" >> Dockerfile
        echo "  zap.sh -$MODE -host 0.0.0.0 -port $PORT \\" >> Dockerfile
        echo "  -config api.key=\$ZAP_API_KEY \\" >> Dockerfile
        echo "  -config api.addrs.addr.name=.* \\" >> Dockerfile
        echo "  -config api.addrs.addr.regex=true\"]" >> Dockerfile

        echo "✅ Dockerfile generated with embedded API key + startup logging"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Log in to Dockerhub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PAT }}

    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        build-args: |
          ZAP_API_KEY=${{ env.ZAP_API_KEY }}
        tags: |
          ghcr.io/${{ github.repository_owner }}/zapr:latest
          ghcr.io/${{ github.repository_owner }}/zapr:${{ env.VERSION }}
          mockholm/zapr:latest
          mockholm/zapr:${{ env.VERSION }}

    - name: Create GitHub Secret
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GH_PAT }}
        script: |
          const [owner, repo] = '${{ github.repository }}'.split('/');
          await github.rest.actions.createOrUpdateRepoSecret({
            owner: owner,
            repo: repo,
            secret_name: 'ZAP_API_KEY',
            value: process.env.ZAP_API_KEY
          });

    - name: Trigger ZAP Version Test Workflow
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GH_PAT }}
        script: |
          const [owner, repo] = '${{ github.repository }}'.split('/');
          await github.rest.actions.createWorkflowDispatch({
            owner: owner,
            repo: repo,
            workflow_id: "zap-test-ghcr.yml",
            ref: context.ref,
            inputs: {
              apiKey: process.env.ZAP_API_KEY
            }
          });