name: ZAP Baseline Scan

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to scan'
        required: true
        default: 'http://localhost:3000'
      config_url:
        description: 'URL of config file'
        required: false
      include_alpha:
        description: 'Include alpha rules'
        required: false
        default: 'false'
      debug:
        description: 'Enable debug'
        required: false
        default: 'false'

jobs:
  zap-baseline:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    env:
      TARGET_URL: ${{ inputs.target_url }}
      CONFIG_URL: ${{ inputs.config_url }}
      DEBUG: ${{ inputs.debug }}
      ZAPR_WORKSPACE: zap-baseline-results
    services:
      juice-shop:
        image: bkimminich/juice-shop:latest
        ports:
          - 3000:3000
        options: --shm-size=512m
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack + pin pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run build

      - name: Create workspace directory
        run: |
          mkdir -p $ZAPR_WORKSPACE
          chmod -R 777 $ZAPR_WORKSPACE

      - name: Wait for Juice Shop to be ready
        run: |
          echo "Waiting for Juice Shop to be ready..."
          timeout=120
          counter=0
          while [ $counter -lt $timeout ]; do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Juice Shop is ready!"
              exit 0
            fi
            counter=$((counter + 5))
            sleep 5
          done
          echo "Juice Shop failed to start within $timeout seconds"
          exit 1

      - name: Run ZAP Baseline Scan
        run: |
          DEBUG_FLAG=""
          CONFIG_FLAG=""
          ALPHA_FLAG=""
          if [ "${{ inputs.debug }}" == "true" ]; then
            DEBUG_FLAG="--debug"
          fi
          if [ -n "${{ inputs.config_url }}" ]; then
            CONFIG_FLAG="--config-url ${{ inputs.config_url }}"
          fi
          if [ "${{ inputs.include_alpha }}" == "true" ]; then
            ALPHA_FLAG="--include-alpha"
          fi
          pnpm run docker:baseline-scan --target $TARGET_URL \
            --report-html report.html \
            --report-json report.json \
            --workspace $ZAPR_WORKSPACE \
            $CONFIG_FLAG \
            $ALPHA_FLAG \
            $DEBUG_FLAG \
            --ignore-warning

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: zap-baseline-reports-${{ github.run_number }}
          path: ${{ env.ZAPR_WORKSPACE }}/
          retention-days: 30

      - name: Display Results
        run: |
          echo "## ZAP Baseline Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** $TARGET_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f $ZAPR_WORKSPACE/report.json ]; then
            HIGH=$(grep -o '"risk":"HIGH"' $ZAPR_WORKSPACE/report.json | wc -l)
            MEDIUM=$(grep -o '"risk":"MEDIUM"' $ZAPR_WORKSPACE/report.json | wc -l)
            LOW=$(grep -o '"risk":"LOW"' $ZAPR_WORKSPACE/report.json | wc -l)
            INFO=$(grep -o '"risk":"INFORMATIONAL"' $ZAPR_WORKSPACE/report.json | wc -l)
            
            echo "### Alert Summary" >> $GITHUB_STEP_SUMMARY
            echo "| Risk Level | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|------------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| High | $HIGH |" >> $GITHUB_STEP_SUMMARY
            echo "| Medium | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
            echo "| Low | $LOW |" >> $GITHUB_STEP_SUMMARY
            echo "| Informational | $INFO |" >> $GITHUB_STEP_SUMMARY
          fi