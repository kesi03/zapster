name: ZAP Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  zap-scan:
    name: OWASP ZAP Security Scan
    runs-on: ubuntu-latest
    env:
      ZAP_HOST: localhost
      ZAP_PORT: 8080
      ZAP_API_KEY: zapster-api-key
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create results directory
        run: mkdir -p zap-results

      - name: Start Juice Shop
        run: |
          docker run -d --name juice-shop -p 3000:3000 bkimminich/juice-shop:latest
          echo "Waiting for Juice Shop to start..."
          for i in {1..60}; do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Juice Shop is ready!"
              break
            fi
            echo "Waiting for Juice Shop... ($i/60)"
            sleep 2
          done

      - name: Start ZAP daemon
        run: |
          docker run -d --name zap -p 8080:8080 -v ${{ github.workspace }}/zap-results:/zap/wrk:rw \
            -e ZAP_API_KEY=zapster-api-key \
            mockholm/zap-daemon
          echo "Waiting for ZAP to start..."
          for i in {1..60}; do
            if curl -s http://localhost:8080 > /dev/null 2>&1; then
              echo "ZAP is ready!"
              break
            fi
            echo "Waiting for ZAP... ($i/60)"
            sleep 2
          done

      - name: Get ZAP Version
        run: npm run zap:version

      - name: Run Spider Scan
        run: npm run baseScan -- --url http://localhost:3000 --timeout 120000

      - name: Run Passive Scan
        run: npm run passiveScan -- --enable

      - name: Run Active Scan
        run: npm run activeScan -- --url http://localhost:3000 --timeout 300000

      - name: Generate JSON Report
        run: npm run getReport -- --format json --output zap-results/report.json

      - name: Generate HTML Report
        run: npm run getReport -- --format html --output zap-results/report.html

      - name: Generate XML Report
        run: npm run getReport -- --format xml --output zap-results/report.xml

      - name: Generate JUnit Results
        run: npm run createJUnitResults -- --output zap-results/junit-results.xml --title "ZAP Security Scan"

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-reports
          path: zap-results/
          retention-days: 30

      - name: Display Results Summary
        run: |
          echo "## ZAP Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Reports generated in zap-results/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f zap-results/report.json ]; then
            echo "### Alert Summary" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat zap-results/report.json | head -100 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Cleanup
        if: always()
        run: |
          docker stop juice-shop zap 2>/dev/null || true
          docker rm juice-shop zap 2>/dev/null || true
